name = "my-app"
main = "_worker.js"
compatibility_date = "2024-09-01"

[assets]
directory = "."
binding = "ASSETS"
# Run the Worker BEFORE serving these public pages so it can brand the raw HTML
# for no-JS consumers (social link previews / crawlers) — the client-side skin
# never runs for them, so a shared VBD link would otherwise show "Journey
# Junction". Only these shareable pages are listed; everything else (dashboard,
# admin, images, JS/CSS) keeps the fast direct-from-assets path unchanged.
run_worker_first = [
  "/", "/index.html",
  "/login", "/login.html",
  "/apply", "/apply.html",
  "/signup", "/signup.html",
  "/terms", "/terms.html",
  "/privacy", "/privacy.html"
]

# Workers AI — powers the CS-console chat translation (/api/translate, env.AI).
# Requires Workers AI enabled on the Cloudflare account.
[ai]
binding = "AI"
